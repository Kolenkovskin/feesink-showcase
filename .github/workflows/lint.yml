name: lint

on:
  push:
  pull_request:

jobs:
  module_size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run module size guard
        run: |
          python scripts/lint_module_size.py
