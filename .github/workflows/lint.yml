name: lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (best-effort)
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip install .
          else
            echo "No requirements.txt / pyproject.toml found; continuing."
          fi

      - name: Import smoke (fail-fast)
        run: |
          python scripts/import_smoke.py

      - name: SQLite storage smoke (billing P0)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs
          python scripts/db_smoke_sqlite.py | tee logs/db_smoke_sqlite_ci.txt

      - name: Module size guard (<=700 LOC)
        run: |
          python scripts/lint_module_size.py

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: feesink-smoke-logs
          path: |
            logs/import_smoke.txt
            logs/db_smoke_sqlite_ci.txt
          if-no-files-found: ignore
